name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
          - explicit
      version:
        description: "Explicit version in X.Y.Z format (required only when bump=explicit)"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Validate workflow inputs
        env:
          BUMP: ${{ github.event.inputs.bump }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [[ "$BUMP" == "explicit" && -z "$INPUT_VERSION" ]]; then
            echo "Input error: version is required when bump=explicit." >&2
            exit 1
          fi

          if [[ "$BUMP" != "explicit" && -n "$INPUT_VERSION" ]]; then
            echo "Input error: version must be empty unless bump=explicit." >&2
            exit 1
          fi

      - name: Bump tracked version markers
        id: bump
        env:
          BUMP: ${{ github.event.inputs.bump }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [[ "$BUMP" == "explicit" ]]; then
            RESOLVED_VERSION="$(python tools/bump_version.py --version "$INPUT_VERSION")"
          else
            RESOLVED_VERSION="$(python tools/bump_version.py --bump "$BUMP")"
          fi
          echo "version=$RESOLVED_VERSION" >> "$GITHUB_OUTPUT"

      - name: Check version marker alignment
        run: |
          python tools/check_version_parity.py

      - name: Fail on empty release change
        run: |
          if git diff --quiet -- VERSION README.md canon_versions.txt; then
            echo "No version marker changes were produced; refusing to create an empty PR." >&2
            exit 1
          fi

      - name: Open or update release PR
        uses: peter-evans/create-pull-request@v8
        with:
          branch: automation/version-alignment
          delete-branch: false
          commit-message: "chore(release): v${{ steps.bump.outputs.version }}"
          title: "chore(release): v${{ steps.bump.outputs.version }}"
          body: |
            ## Summary
            Manual version-alignment release PR generated from `workflow_dispatch`.

            ## Included changes
            - Updated `VERSION`
            - Updated `README.md` tracked version markers
            - Updated `canon_versions.txt`
          base: main
          add-paths: |
            VERSION
            README.md
            canon_versions.txt
