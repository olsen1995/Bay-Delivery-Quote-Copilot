name: Generate requirements.lock.txt

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-lock:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pip-tools
        run: |
          python -m pip install --upgrade "pip<25.3"
          python -m pip install pip-tools==7.4.1

      - name: Compile lock file
        run: pip-compile --resolver=backtracking --output-file requirements.lock.txt requirements.txt

      - name: Verify only lock file changed
        run: |
          changed_files="$(git status --porcelain | awk '{print $2}')"
          if [ -z "$changed_files" ]; then
            echo "No changes detected."
            exit 0
          fi

          if [ "$(printf '%s\n' "$changed_files" | wc -l)" -ne 1 ] || [ "$changed_files" != "requirements.lock.txt" ]; then
            echo "Unexpected modified files detected:"
            printf '%s\n' "$changed_files"
            exit 1
          fi

      - name: Commit and push lock file
        run: |
          if [ -z "$(git status --porcelain -- requirements.lock.txt)" ]; then
            echo "No changes to requirements.lock.txt to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add requirements.lock.txt
          git commit -m "chore: regenerate requirements.lock.txt"
          git push origin HEAD:${{ github.ref_name }}
