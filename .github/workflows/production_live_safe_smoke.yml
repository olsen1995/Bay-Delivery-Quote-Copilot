name: Production Live-Safe Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

concurrency:
  group: production-live-safe-smoke
  cancel-in-progress: false

jobs:
  live-safe-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      BASE_URL: ${{ secrets.BASE_URL }}
      ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock.txt

      - name: Validate required smoke env vars
        run: |
          test -n "$BASE_URL" || (echo "Missing required secret: BASE_URL" && exit 1)
          test -n "$ADMIN_USERNAME" || (echo "Missing required secret: ADMIN_USERNAME" && exit 1)
          test -n "$ADMIN_PASSWORD" || (echo "Missing required secret: ADMIN_PASSWORD" && exit 1)

      - name: Run production live-safe smoke
        run: python scripts/smoke_test.py --mode live-safe --check-gpt-observability

      - name: Verify deployed VERSION matches checked-out VERSION
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request
          from pathlib import Path

          base_url = os.environ["BASE_URL"].rstrip("/")
          expected_version = Path("VERSION").read_text(encoding="utf-8").strip()

          with urllib.request.urlopen(f"{base_url}/health", timeout=20) as response:
              health = json.loads(response.read().decode("utf-8"))

          live_version = str(health.get("version", "")).strip()
          if live_version != expected_version:
              raise SystemExit(
                  f"Deployed VERSION mismatch: expected {expected_version}, got {live_version or '<missing>'}"
              )

          print(f"Deployed VERSION aligned: {live_version}")
          PY
