<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Bay Delivery — Admin Uploads</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <link rel="stylesheet" href="/static/admin.css" />
  <link rel="stylesheet" href="/static/admin_uploads.css" />
</head>

<body>
  <div class="container">
    <div class="topbar">
      <div class="brand">
        <div class="brandMark">BD</div>
        <div class="brandTitle">
          <strong>Bay Delivery</strong><br />
          <span class="muted">Admin — Uploads</span>
        </div>
      </div>
      <div class="toplinks">
        <a class="badgeLink" href="/admin">Dashboard</a>
        <a class="badgeLink" href="/">Home</a>
      </div>
    </div>

    <div class="card">
      <h1>Customer Uploads</h1>
      <p class="muted">Search by Quote ID to see photos stored in Google Drive.</p>

      <div class="formWrap">
        <label for="quote_id">Quote ID</label>
        <input id="quote_id" placeholder="paste quote id here" />
        <div class="btnRowTop">
          <button class="btn" id="btnSearch" type="button">Search</button>
        </div>
      </div>
    </div>


      <div class="card mt14">
        <div class="small">
          Admin access uses <strong>Basic Auth</strong> (<code>ADMIN_USERNAME</code> + <code>ADMIN_PASSWORD</code>).
        </div>
        <div class="rowCreds mt10">
          <div class="field">
            <label for="adminUsername">Admin Username</label>
            <input id="adminUsername" placeholder="ADMIN_USERNAME" autocomplete="username" />
          </div>
          <div class="field">
            <label for="adminPassword">Admin Password</label>
            <input id="adminPassword" type="password" placeholder="ADMIN_PASSWORD" autocomplete="current-password" />
          </div>
        </div>
        <div class="muted small mt10">
          Note: token-based auth (<code>?token=</code> / <code>X-Admin-Token</code>) is not used by the backend.
        </div>
      </div>


    <div class="card resultsHidden" id="resultsCard">
      <h2>Results</h2>
      <div id="results"></div>
    </div>
  </div>

  <script src="/static/admin_uploads.js" defer></script>
</body>
</html>
