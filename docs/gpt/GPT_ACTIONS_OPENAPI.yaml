openapi: 3.1.0
info:
  title: Bay Delivery Internal GPT Actions
  version: 0.12.0
  description: Source schema for internal Bay Delivery GPT Builder quote and advisory admin note actions.
servers:
  - url: https://bay-delivery-quote-copilot.onrender.com
security:
  - bearerAuth: []
paths:
  /api/gpt/quote:
    post:
      operationId: getGptQuote
      summary: Get internal quote totals
      description: Internal Bay Delivery quote calculation. Uses backend pricing, returns totals and risk context, and does not persist a quote.
      x-openai-isConsequential: false
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GptQuoteRequest"
      responses:
        "200":
          description: Authoritative quote totals and internal risk context.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GptQuoteResponse"
        "400":
          description: Invalid business-rule input, such as an unknown service type or missing required load details.
        "401":
          description: Missing or invalid internal bearer token.
        "422":
          description: Request body does not match the action schema.
        "429":
          description: Internal GPT quote rate limit exceeded.
  /api/gpt/admin-notes:
    post:
      operationId: createGptAdminNote
      summary: Create advisory GPT admin note
      description: Internal Bay Delivery advisory note creation for admin review. Persists an internal-only GPT Admin Note and never changes pricing, lifecycle status, scheduling, payments, customer messages, or customer-visible records.
      x-openai-isConsequential: true
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GptAdminNoteRequest"
      responses:
        "200":
          description: Advisory GPT Admin Note created, or existing note returned for an idempotent replay.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GptAdminNoteResponse"
        "400":
          description: Backend validation or storage value error.
        "401":
          description: Missing or invalid internal bearer token.
        "404":
          description: Endpoint disabled because the internal token is unset, or the related entity was not found.
        "409":
          description: Duplicate or conflicting advisory note.
        "422":
          description: Request body does not match the action schema.
        "429":
          description: Internal GPT admin notes rate limit exceeded.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: internal-token
      description: Internal bearer token expected by the backend. Do not store token values in this schema.
  schemas:
    GptQuoteRequest:
      type: object
      additionalProperties: false
      required:
        - service_type
        - description
      properties:
        service_type:
          type: string
          enum:
            - haul_away
            - small_move
            - item_delivery
            - demolition
            - scrap_pickup
          description: "Use canonical backend values only. Map dump run, junk removal, haul-away, haul away, curbside pickup, garbage bags, couches, mattresses, general removal to haul_away; small moving job to small_move; item delivery, marketplace delivery, pickup/drop-off to item_delivery; demolition, tear-out, floor removal, structure teardown labour to demolition; scrap metal pickup to scrap_pickup."
        description:
          type: string
          minLength: 1
          maxLength: 1000
          description: Customer-visible job details or internal scope notes to price.
        pickup_address:
          type:
            - string
            - "null"
          maxLength: 250
          description: Required with dropoff_address for small_move and item_delivery.
        dropoff_address:
          type:
            - string
            - "null"
          maxLength: 250
          description: Required with pickup_address for small_move and item_delivery.
        estimated_hours:
          type: number
          minimum: 0
          default: 0
          description: Estimated labour hours when relevant.
        crew_size:
          type: integer
          minimum: 1
          default: 1
          description: Crew size to evaluate when relevant.
        garbage_bag_count:
          type: integer
          minimum: 0
          default: 0
          description: Number of garbage bags for haul_away load detail.
        bag_type:
          type:
            - string
            - "null"
          enum:
            - light
            - heavy_mixed
            - construction_debris
            - null
          description: Bag material class for haul_away.
        trailer_fill_estimate:
          type:
            - string
            - "null"
          enum:
            - under_quarter
            - quarter
            - half
            - three_quarter
            - full
            - null
          description: Trailer space estimate for haul_away load detail.
        trailer_class:
          type:
            - string
            - "null"
          enum:
            - single_axle_open_aluminum
            - double_axle_open_aluminum
            - older_enclosed
            - newer_enclosed
            - null
          description: Trailer type when it materially affects the quote.
        mattresses_count:
          type: integer
          minimum: 0
          default: 0
          description: Number of mattresses in the haul-away scope.
        box_springs_count:
          type: integer
          minimum: 0
          default: 0
          description: Number of box springs in the haul-away scope.
        scrap_pickup_location:
          type: string
          enum:
            - curbside
            - inside
          default: curbside
          description: Pickup location for scrap_pickup.
        travel_zone:
          type: string
          enum:
            - in_town
            - surrounding
            - out_of_town
          default: in_town
          description: Travel zone for margin-protected travel adders.
        access_difficulty:
          type: string
          enum:
            - normal
            - difficult
            - extreme
          default: normal
          description: Access difficulty for stairs, long carry, tight access, or similar constraints.
        has_dense_materials:
          type: boolean
          default: false
          description: Whether dense or heavy materials are present.
        load_mode:
          type:
            - string
            - "null"
          enum:
            - standard
            - space_fill
            - null
          default: standard
          description: Use space_fill only for haul_away trailer-space style estimates.
        stairs_count:
          type:
            - integer
            - "null"
          minimum: 0
          description: Optional structured access fact. Backend quote safeguards use stairs_count > 0 to let normal access price through the existing difficult-access path after PR #345, including small move or haul-away jobs and demolition context where applicable.
        floor_count:
          type:
            - integer
            - "null"
          minimum: 0
          description: Optional structured access fact. Backend quote safeguards use floor_count >= 2 to let normal access price through the existing difficult-access path after PR #345, including small move or haul-away jobs and demolition context where applicable.
        basement_or_inside_removal:
          type:
            - boolean
            - "null"
          description: Optional structured access fact. Backend quote safeguards use true basement or inside-removal context to let normal access price through the existing difficult-access path after PR #345, including small move or haul-away jobs and demolition context where applicable.
        demolition_ripout:
          type:
            - boolean
            - "null"
          description: Optional demolition/rip-out context. Used only by backend quote safeguards.
        construction_debris_type:
          type:
            - string
            - "null"
          enum:
            - drywall
            - wood
            - tile
            - concrete
            - shingles
            - mixed
            - other
            - null
          description: Optional demolition material context. Used only by backend quote safeguards.
        dense_material_type:
          type:
            - string
            - "null"
          enum:
            - drywall
            - tile
            - concrete
            - shingles
            - soil
            - brick
            - stone
            - mixed
            - other
            - null
          description: Optional dense demolition material context. Used only by backend quote safeguards.
    GptQuoteResponse:
      type: object
      additionalProperties: false
      required:
        - cash_total_cad
        - emt_total_cad
        - disclaimer
        - normalized_service_type
        - confidence_level
        - risk_flags
        - quote_risk_advisory
        - quote_risk_summary
      properties:
        cash_total_cad:
          type: number
          description: Authoritative cash total in CAD from backend pricing.
        emt_total_cad:
          type: number
          description: Authoritative EMT/e-transfer total in CAD from backend pricing.
        disclaimer:
          type: string
          description: Backend quote disclaimer.
        normalized_service_type:
          type: string
          enum:
            - haul_away
            - small_move
            - item_delivery
            - demolition
            - scrap_pickup
          description: Canonical service type returned by the backend.
        confidence_level:
          type: string
          description: Internal quote confidence signal from backend risk assessment.
        risk_flags:
          type: array
          items:
            type: string
          description: Internal risk flags from backend risk assessment.
        quote_risk_advisory:
          anyOf:
            - $ref: "#/components/schemas/GptQuoteRiskAdvisory"
            - type: "null"
          description: Internal-only advisory metadata for Austin and Dan. Not customer-visible and does not change pricing.
        quote_risk_summary:
          $ref: "#/components/schemas/GptQuoteRiskSummary"
          description: Internal-only normalized risk summary. Not customer-visible and does not change pricing.
    GptQuoteRiskAdvisoryFlag:
      type: object
      additionalProperties: false
      required:
        - code
        - severity
        - label
        - operator_note
      properties:
        code:
          type: string
          description: Internal advisory flag code.
        severity:
          type: string
          enum:
            - low
            - medium
            - high
          description: Internal severity for admin review.
        label:
          type: string
          description: Short internal flag label.
        operator_note:
          type: string
          description: Internal operator note for Austin or Dan.
    GptQuoteRiskAdvisory:
      type: object
      additionalProperties: false
      required:
        - manual_review_recommended
        - risk_level
        - risk_flags
        - suggested_actions
        - pricing_effect
        - customer_visible
      properties:
        manual_review_recommended:
          type: boolean
          description: True when owner review is recommended before approval.
        risk_level:
          type: string
          enum:
            - low
            - medium
            - high
          description: Internal advisory risk level.
        risk_flags:
          type: array
          items:
            $ref: "#/components/schemas/GptQuoteRiskAdvisoryFlag"
          description: Internal structured advisory flags.
        suggested_actions:
          type: array
          items:
            type: string
          description: Internal admin follow-up suggestions.
        pricing_effect:
          type: string
          enum:
            - none
          description: Advisory metadata only; pricing is unchanged.
        customer_visible:
          type: boolean
          enum:
            - false
          description: Always false. Internal GPT advisory metadata is not customer-visible.
        recommended_trailer:
          type:
            - string
            - "null"
          description: Optional internal trailer recommendation when risk context suggests one.
    GptQuoteRiskSummary:
      type: object
      additionalProperties: false
      required:
        - risk_level
        - reasons
        - missing_info
        - suggested_action
        - crew_suggestion
        - trailer_suggestion
        - pricing_caution
        - customer_visible
        - pricing_effect
      properties:
        risk_level:
          type: string
          description: Internal summary level, including owner_review when applicable.
        reasons:
          type: array
          items:
            type: string
          description: Internal normalized reason slugs.
        missing_info:
          type: array
          items:
            type: string
          description: Internal follow-up fields that may improve review confidence.
        suggested_action:
          type: string
          description: Internal suggested next action for admin or GPT follow-up.
        crew_suggestion:
          type: string
          description: Internal crew sizing suggestion.
        trailer_suggestion:
          type: string
          description: Internal trailer suggestion.
        pricing_caution:
          type: string
          enum:
            - internal_advisory_only_no_price_change
          description: Advisory metadata does not change backend pricing.
        customer_visible:
          type: boolean
          enum:
            - false
          description: Always false. Internal GPT advisory metadata is not customer-visible.
        pricing_effect:
          type: string
          enum:
            - none
          description: Advisory metadata only; pricing is unchanged.
    GptAdminNoteRequest:
      type: object
      additionalProperties: false
      required:
        - related_entity_type
        - note_type
        - title
        - summary
      properties:
        related_entity_type:
          type: string
          enum:
            - quote
            - quote_request
            - job
            - completed_job_calibration_entry
            - general
          description: Entity type the advisory note should attach to. Prefer a specific known entity; use general only when no entity ID exists.
        related_entity_id:
          type:
            - string
            - "null"
          maxLength: 160
          description: Existing entity ID for quote, quote_request, job, or completed_job_calibration_entry notes. Required by backend unless related_entity_type is general.
        note_type:
          type: string
          enum:
            - job_observation
            - quote_caution
            - missing_info
            - follow_up_recommendation
            - completed_job_calibration_observation
            - customer_message_draft
            - photo_access_density_risk
            - owner_review_context
          description: Advisory note classification for admin review.
        title:
          type: string
          minLength: 1
          maxLength: 120
          description: Concise operational note title.
        summary:
          type: string
          minLength: 1
          maxLength: 1200
          description: Concise advisory summary for Austin or Dan. Do not include passwords, tokens, auth headers, raw uploads, base64, Drive links as authority, or full customer records.
        recommendation:
          type:
            - string
            - "null"
          maxLength: 1000
          description: Optional internal recommendation for admin review or follow-up. Must not instruct pricing, status, scheduling, payment, or customer-message mutations.
        customer_message_draft:
          type:
            - string
            - "null"
          maxLength: 1000
          description: Optional draft/copy-only customer message. The action does not send messages.
        risk_flags:
          type: array
          maxItems: 10
          items:
            type: string
            maxLength: 40
          description: Optional concise risk flag slugs. Backend normalizes values and de-duplicates them.
        follow_up_needed:
          type: boolean
          default: false
          description: Whether the note should flag likely admin follow-up.
        idempotency_key:
          type:
            - string
            - "null"
          maxLength: 160
          description: Stable retry key. Prefer providing one so retries do not create duplicate notes.
    GptAdminNoteResponse:
      type: object
      additionalProperties: false
      required:
        - note_id
        - created
      properties:
        note_id:
          type: string
          description: Persisted GPT Admin Note ID.
        created:
          type: boolean
          description: True when a new note was created; false when an existing note was returned for an idempotent replay.
