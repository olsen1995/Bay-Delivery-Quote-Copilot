services:
  - type: web
    name: bay-delivery-quote-copilot
    runtime: python
    plan: starter
    buildCommand: apt-get update && apt-get install -y tesseract-ocr && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health

    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1

    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: BAYDELIVERY_DB_PATH
        value: /var/data/bay_delivery.sqlite3
      - key: LOCAL_TIMEZONE
        value: America/Toronto
      - key: BAYDELIVERY_CORS_ORIGINS
        value: https://bay-delivery-quote-copilot.onrender.com
