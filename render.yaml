services:
  - type: web
    name: bay-delivery-quote-copilot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    # Keep env vars explicit in Render dashboard/Blueprint settings.
    # Required for protected admin APIs in public deployments:
    # - ADMIN_USERNAME
    # - ADMIN_PASSWORD
    # Recommended:
    # - BAYDELIVERY_CORS_ORIGINS (comma-separated allowlist)
    # Optional:
    # - GDRIVE_FOLDER_ID
    # - GDRIVE_SA_KEY_B64
    # - GDRIVE_BACKUP_KEEP
    # - GDRIVE_AUTO_SNAPSHOT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
