services:
  - type: web
    name: bay-delivery-quote-copilot
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health

    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1

    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: BAYDELIVERY_DB_PATH
        value: /var/data/bay_delivery.sqlite3
